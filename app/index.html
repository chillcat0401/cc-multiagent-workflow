<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>星座与塔罗牌解析</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<noscript>
  <div class="noscript-banner">请启用 JavaScript 以使用星座与塔罗牌应用</div>
</noscript>

<!-- Decorative star dots (CSS-only) -->
<div class="stars-decoration">
  <span class="star-dot s1" aria-hidden="true"></span>
  <span class="star-dot s2" aria-hidden="true"></span>
  <span class="star-dot s3" aria-hidden="true"></span>
  <span class="star-dot s4" aria-hidden="true"></span>
  <span class="star-dot s5" aria-hidden="true"></span>
  <span class="star-dot s6" aria-hidden="true"></span>
</div>

<!-- Page Title -->
<header class="app-header">
  <h1 class="app-title">星辰·秘语</h1>
  <p class="app-subtitle">探索你的命运轨迹</p>
</header>

<!-- Scrollable Content Area -->
<main class="content-area">

  <!-- Astrology Section (星座) -->
  <section id="section-astrology" class="tab-section active">
    <div class="birth-date-area">
      <label class="birth-date-label" for="birthDateInput">选择你的出生日期，发现你的星座</label>
      <input type="date" id="birthDateInput" class="birth-date-input">
    </div>
    <div class="zodiac-grid" id="zodiacGrid">
      <!-- Generated by JS -->
    </div>
  </section>

  <!-- Tarot Section (塔罗) -->
  <section id="section-tarot" class="tab-section">
    <div class="tarot-controls">
      <button class="btn btn-primary" id="btnSingleDraw">单张指引</button>
      <button class="btn btn-primary" id="btnThreeDraw">三张牌阵</button>
    </div>
    <div class="tarot-spread" id="tarotSpread">
      <!-- Generated by JS -->
    </div>
    <button class="btn btn-ghost" id="btnReset" style="display:none;">重新抽牌</button>
    <div class="tarot-history-area">
      <button class="btn-history-toggle" id="btnHistoryToggle">历史</button>
      <div id="tarotHistoryArea" style="display:none;">
        <ul class="history-list" id="historyList"></ul>
      </div>
    </div>
  </section>

</main>

<!-- Bottom Tab Navigation -->
<nav class="tab-bar">
  <button class="tab-btn active" data-tab="astrology" aria-selected="true">
    <span class="tab-icon">✨</span>
    <span class="tab-label">星座</span>
  </button>
  <button class="tab-btn" data-tab="tarot" aria-selected="false">
    <span class="tab-icon">🔮</span>
    <span class="tab-label">塔罗</span>
  </button>
</nav>

<!-- Zodiac Detail Modal -->
<div class="modal-overlay" id="modalOverlay" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
  <div class="modal-card" id="modalCard">
    <button class="modal-close" id="modalClose" aria-label="关闭">&times;</button>
    <div class="modal-content" id="modalContent">
      <!-- Generated by JS -->
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
